name = "algorithmic-arts-community"
main = "worker/index.ts"
compatibility_date = "2026-07-04"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put`):
#   GITHUB_TOKEN       — classic PAT (bot posting on any Binary-Blender repo)
#   GOOGLE_CLIENT_IDS  — comma-separated allowlist of Google OAuth client IDs

# KV — per-user like state + per-content counter for the ♡ button.
# Keys:
#   like:<content>:<issue>:<sub>   → epoch ms of the like (presence = liked)
#   count:<content>:<issue>        → integer as string
[[kv_namespaces]]
binding = "AA_LIKES"
id = "a5fa1aea07ce43a5a2774fd8a9fd7ab0"

# KV — cross-medium links between content items on the platform.
# Keys:
#   link:<id>                            → JSON  {from, to, note, sub, email, name, createdAt}
#   linkout:<fromCreator>/<fromContent>:<id>  → id (index for "outgoing" listing)
#   linkin:<toCreator>/<toContent>:<id>       → id (index for "incoming" listing)
# id = `<ms-timestamp>-<8-char-random>`  — sortable, unique enough
[[kv_namespaces]]
binding = "AA_LINKS"
id = "b97dd4fda6ee4a249ceccf086f92f5ca"

# KV — cached responses from external content sources (RSS / YouTube /
# Spotify / etc.). Values are the normalized JSON returned to the client.
# expirationTtl set per fetch — 15 min for RSS, 15 min for YouTube.
# Key format: <type>:<canonical-id>  e.g. rss:https://blog.example.com/feed
[[kv_namespaces]]
binding = "AA_EXTERNAL"
id = "00db597bb219462ab6fe04661727f723"

# KV — dream-machine rate-limit counters + 60s manifest cache.
# Keys:
#   ip:<cf-connecting-ip>:<YYYY-MM-DD>  → count (TTL ~25h)
#   global:<YYYY-MM-DD>                 → count (TTL ~25h)
#   manifest                            → dreams.json body (TTL 60s)
# Extra secret: HF_TOKEN — Bearer for the private BabyAI Space.
[[kv_namespaces]]
binding = "AA_DREAMS"
id = "387de9f53fa347caa8db806de2f16eab"
